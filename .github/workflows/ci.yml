name: iOS CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ios-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  repository-validation:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate repository contract
        shell: pwsh
        run: ./scripts/validate_project.ps1

  build-and-test:
    runs-on: macos-15
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Select simulator
        id: simulator
        shell: bash
        run: |
          set -euo pipefail
          DEVICE_ID=$(xcrun simctl list devices available -j | python3 -c 'import json,sys; d=json.load(sys.stdin)["devices"]; print(next(x["udid"] for runtime in d.values() for x in runtime if x["name"].startswith("iPhone") and x["isAvailable"]))')
          echo "id=$DEVICE_ID" >> "$GITHUB_OUTPUT"
          xcrun simctl boot "$DEVICE_ID" || true
          xcrun simctl bootstatus "$DEVICE_ID" -b

      - name: Build and run unit/UI tests
        env:
          NSUnbufferedIO: YES
        run: |
          set -o pipefail
          mkdir -p build
          xcodebuild test \
            -project Daisy.xcodeproj \
            -scheme Daisy \
            -destination "platform=iOS Simulator,id=${{ steps.simulator.outputs.id }}" \
            -resultBundlePath build/DaisyTests.xcresult \
            CODE_SIGNING_ALLOWED=NO

      - name: Upload test result on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: DaisyTests-xcresult
          path: build/DaisyTests.xcresult
          retention-days: 1
