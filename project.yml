name: Daisy

options:
  bundleIdPrefix: com.daisy.personal
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.3.0"
    CURRENT_PROJECT_VERSION: "5"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic

targets:
  Daisy:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: App
      - path: Domain
      - path: Persistence
      - path: Services
      - path: Intents
      - path: Features
      - path: Resources
        excludes:
          - Info.plist
          - Brand
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.daisy.personal.app
        PRODUCT_NAME: Daisy
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        INFOPLIST_FILE: Resources/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        SUPPORTS_MACCATALYST: NO
        TARGETED_DEVICE_FAMILY: "1"
    scheme:
      gatherCoverageData: true
      testTargets:
        - DaisyTests
        - DaisyUITests

  DaisyTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: DaisyTests
    dependencies:
      - target: Daisy
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.daisy.personal.tests
        GENERATE_INFOPLIST_FILE: YES

  DaisyUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: DaisyUITests
    dependencies:
      - target: Daisy
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.daisy.personal.uitests
        GENERATE_INFOPLIST_FILE: YES
